services:
  - type: web
    name: njl-catalogue
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: PARQUET_BLOB_URL
        value: "https://njlprodimages.blob.core.windows.net/protopisfolder/BOM_Enriched_Latest_Transdate.parquet"
      - key: AUTH_BLOB_URL
        value: "https://njlprodimages.blob.core.windows.net/protopisfolder/auth.xlsx"
      - key: REFRESH_INTERVAL_MINUTES
        value: "5"
      - key: REFRESH_SECRET
        sync: false
    healthCheckPath: /api/health
